name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - config-DatevCompanyCredential

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  rebuild:
    env:
      VITE_KEYCLOAK_URL: https://keycloak-demo.eudi-adorsys.com
      VITE_KEYCLOAK_REALM: oid4vc-vci
      VITE_KEYCLOAK_CLIENT_ID: oid4vc-demo-public
      VITE_OID4VC_DEFAULT_CREDENTIAL_CONFIGURATION_ID: DatevCompanyCredential
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base=/keycloak-oid4vc-mock-fe/

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: rebuild

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
